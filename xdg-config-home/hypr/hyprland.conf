# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = , preferred, auto, auto
monitor = eDP-1, preferred, auto, 1.5666666

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Source a file (multi-file configs)
source = ./hyprland/initialize.conf
source = ./hyprland/layout.conf
source = ./hyprland/binds.conf
source = ./hyprland/rules.conf
source = ./hyprland/style.conf

debug {
    # disable_logs = false
}

general {
    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 to 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
        scroll_factor = 0.25
        drag_lock = 0
    }

    tablet {
        output = current
        relative_input = false
    }
}

# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
# device {
#     name = epic-mouse-v1
#     sensitivity = -0.5
# }

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe_forever = true
    workspace_swipe_cancel_ratio = 0.4
}

gesture = 3, horizontal, workspace
# gesture = 4, pinchin, dispatcher, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float:/ {print $2 + 0.2}')
# gesture = 4, pinchout, dispatcher, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float:/ {x = $2 - 0.2; print (x > 1) ? x : 1}')

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    # bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = myBezier, 0, 1, 0.2, 1

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 0, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
    animation = layers, 1, 4, default
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    middle_click_paste = false
}

xwayland {
    force_zero_scaling = true
}
