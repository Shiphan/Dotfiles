# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER
$alternative = SHIFT

$terminal = alacritty # kitty
$fileManager = nautilus
$menu = rofi -show drun

# Binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
# Open things
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Space, exec, $menu
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

bind = $mainMod, C, killactive
bind = $mainMod, Delete, killactive
bind = $mainMod, Backspace, killactive
bind = $mainMod, F, fullscreen, 1
bind = $mainMod $alternative, F, fullscreen, 0
bind = $mainMod, R, fullscreenstate, 0 -1 set
bind = $mainMod $alternative, R, fullscreenstate, 0 0 set
bind = $mainMod, M, layoutmsg, togglesplit
bind = $mainMod, B, togglefloating
bind = $mainMod $alternative, B, pin

bind = $mainMod, G, togglegroup
bind = $mainMod $alternative, G, moveoutofgroup
bind = $mainMod, I, changegroupactive, f
bind = $mainMod, O, changegroupactive, b
bind = $mainMod, Tab, cyclenext
bind = $mainMod $alternative, Tab, cyclenext, prev
binde = $mainMod, equal, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float:/ {print $2 + 0.1}')
binde = $mainMod, minus, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float:/ {x = $2 - 0.1; print (x > 1) ? x : 1}')

# Move focus with mainMod + hjkl
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod $alternative, H, swapwindow, l
bind = $mainMod $alternative, L, swapwindow, r
bind = $mainMod $alternative, K, swapwindow, u
bind = $mainMod $alternative, J, swapwindow, d

binde = $mainMod, left, resizeactive, -10 0
binde = $mainMod, right, resizeactive, 10 0
binde = $mainMod, up, resizeactive, 0 -10
binde = $mainMod, down, resizeactive, 0 10

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, focusworkspaceoncurrentmonitor, 1
bind = $mainMod, 2, focusworkspaceoncurrentmonitor, 2
bind = $mainMod, 3, focusworkspaceoncurrentmonitor, 3
bind = $mainMod, 4, focusworkspaceoncurrentmonitor, 4
bind = $mainMod, 5, focusworkspaceoncurrentmonitor, 5
bind = $mainMod, 6, focusworkspaceoncurrentmonitor, 6
bind = $mainMod, 7, focusworkspaceoncurrentmonitor, 7
bind = $mainMod, 8, focusworkspaceoncurrentmonitor, 8
bind = $mainMod, 9, focusworkspaceoncurrentmonitor, 9
bind = $mainMod, 0, focusworkspaceoncurrentmonitor, 10
bind = $mainMod, u, focusworkspaceoncurrentmonitor, name:Empty

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod $alternative, 1, movetoworkspace, 1
bind = $mainMod $alternative, 2, movetoworkspace, 2
bind = $mainMod $alternative, 3, movetoworkspace, 3
bind = $mainMod $alternative, 4, movetoworkspace, 4
bind = $mainMod $alternative, 5, movetoworkspace, 5
bind = $mainMod $alternative, 6, movetoworkspace, 6
bind = $mainMod $alternative, 7, movetoworkspace, 7
bind = $mainMod $alternative, 8, movetoworkspace, 8
bind = $mainMod $alternative, 9, movetoworkspace, 9
bind = $mainMod $alternative, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod $alternative, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_up, focusworkspaceoncurrentmonitor, e+1
bind = $mainMod, mouse_down, focusworkspaceoncurrentmonitor, e-1

bind = $mainMod, N, focusworkspaceoncurrentmonitor, e+1
bind = $mainMod, P, focusworkspaceoncurrentmonitor, e-1
bind = $mainMod $alternative, N, movetoworkspace, e+1
bind = $mainMod $alternative, P, movetoworkspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod $alternative, mouse:272, resizewindow

# Function keys
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle; snackdaemon update volume
bindle = , XF86AudioLowerVolume, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0; wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-; snackdaemon update volume
bindle = , XF86AudioRaiseVolume, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0; wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+; snackdaemon update volume
bind = , XF86AudioPrev, exec, playerctl previous; snackdaemon update player
bind = , XF86AudioPlay, exec, playerctl play-pause; snackdaemon update player
bind = , XF86AudioNext, exec, playerctl next; snackdaemon update player
# bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindle = , XF86MonBrightnessDown, exec, snackdaemon update screenbrightness; for i in {1..5}; do brightnessctl set 1%-; sleep 0.02; done; eww update brightness=$((($(brightnessctl get) * 100 + $(brightnessctl max) / 2) / $(brightnessctl max)))
# bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindle = , XF86MonBrightnessUp, exec, snackdaemon update screenbrightness; for i in {1..5}; do brightnessctl set 1%+; sleep 0.02; done; eww update brightness=$((($(brightnessctl get) * 100 + $(brightnessctl max) / 2) / $(brightnessctl max)))
bind = , Print, exec, grim && notify-send -e "Screenshot stored."
bind = $alternative, Print, exec, grim - | wl-copy && notify-send -e "Screenshot copied to clipboard."
bind = $mainMod, Print, exec, grim -g "$(slurp)" && notify-send -e "Screenshot stored."
bind = $mainMod $alternative, Print, exec, grim -g "$(slurp)" - | wl-copy && notify-send -e "Screenshot copied to clipboard."
bindl = , XF86AudioMedia, exec, bash ~/.config/hypr/scripts/toggle-powerprofile.sh ; snackdaemon update powerprofiles
bindl = $alternative, XF86AudioMedia, exec, bash ~/.config/hypr/scripts/toggle-powerprofile.sh prev ; snackdaemon update powerprofiles
