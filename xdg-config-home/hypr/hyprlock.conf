# $COLOR2 = rgba(208, 236, 255, 0.35)
# $COLOR3 = rgba(208, 236, 255, 0.2)

$BACKGROUND_IMAGE = /home/shiphan/.config/hypr/wallpapers/koana-1.png
$COLOR = rgba(208, 236, 255, 0.9)
$COLOR2 = rgba(208, 236, 255, 0.35)
$COLOR3 = rgba(208, 236, 255, 0.2)

$CLOCK_VPOSITION = 15

general {
    hide_cursor = true
}

auth {
    fingerprint:enabled = true
}

animation = inputFieldColors, 1, 300, default

background {
    monitor =
    path = $BACKGROUND_IMAGE
    color = rgb(0, 0, 0)

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_passes = 2 # 0 disables blurring
    blur_size = 2
    noise = 0
    contrast = 0.88
    brightness = 0.65
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = cmd[update:1000] date +"%I"
    color = $COLOR
    font_size = 180
    font_family = Noto Sans Medium

    position = -42.5% + 140, {{$CLOCK_VPOSITION + 7.5}}%
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%M"
    color = $COLOR
    font_size = 180
    font_family = Noto Sans Medium

    position = -42.5% + 140, {{$CLOCK_VPOSITION - 7.5}}%
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%p"
    # text = cmd[update:1000] echo "$(date +"%p" | cut -c 1-1) M" # AM/PM
    color = $COLOR2
    font_size = 200
    font_family = Noto Sans Black

    position = -42.5% + 180, $CLOCK_VPOSITION%
    halign = center
    valign = center
}

label {
    monitor =
    # text = cmd[update:1000] date +"%Y/%m/%d"
    text = cmd[update:1000] date +"%Y/%m/%d  %A"
    color = $COLOR
    font_size = 28
    font_family = Noto Sans Regular

    position = 7.5%, {{$CLOCK_VPOSITION + 20}}%
    halign = left
    valign = center
}

